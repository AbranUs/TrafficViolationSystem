# SonarQube Project Configuration
sonar.projectKey=TrafficViolationSystem
sonar.projectName=TrafficViolationSystem
sonar.projectVersion=1.0.0
sonar.host.url=http://127.0.0.1:9000
sonar.token=sqp_616a2fb351d1bfa61812ae30db9e0210e9bdf725

# Path to the source directories
sonar.sources=backend,frontend
sonar.tests=backend/tests

# Exclude generated directories, database fallbacks, and node dependencies
sonar.exclusions=backend/tests/**,backend/app/uploads/**,backend/app/fallback.db,frontend/node_modules/**,frontend/dist/**,**/__pycache__/**,**/*.log,backend/scratch/**

# Source encoding
sonar.sourceEncoding=UTF-8

# Language settings
sonar.language=py,js
sonar.javascript.environments=browser,node
sonar.python.version=3.10
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclude frontend files from code coverage metrics, allowing backend coverage to show in SonarQube
sonar.coverage.exclusions=frontend/**,backend/tests/**

